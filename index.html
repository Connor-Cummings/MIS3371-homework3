<html lang="en">
    <head>
        <link rel="stylesheet" href="hw3.css"> <!-- links to css file (Remember to change this for every homework assignment Hoang Le)-->
        
        <!--displays text in the browser's tab-->
        <title>Patient Registration | Cummings Clinic</title>
    </head>
    <body>
        <header>
            <table width="100%">
                <tr>
                    <td valign="top" align="left" width="20%">
                        <div class="image">
                            <img align="center" src="Cummings.png" alt="Cummings Clinic Logo" width="70px" id="logo"/>
                        </div>
                    </td>

                    <td>
                        <h2>Cummings Clinic</h2>
                    </td>

                    <td valign="bottom" align="right" width="20%">
                        Today's Date: <span id="today"></span>
                    </td>
                </tr>
            </table>
        </header>
<hr>
<!--Form starts here-->
<form name="signup" id="signup" action="thankyou.html">
    <center>
        <div class="format">
            <table>
                <tr>
<!--Header-->       <th colspan="4"> Create Account</th>
                </tr>
<!--Patient's Information Section-->
                <tr>
                    <td class="td1"><label for="fname">First Name:</label></td>
                    <td>
                        <input 
                            type="text" 
                            name="fname" 
                            id="fname"
                            minlength="1"
                            maxlength="30" 
                            title="Letters, dashes, and apostrophes only"
                            pattern="[A-Za-z'-]{1,30}"
                            oninput="validateFname()"
                            onblur="validateFname()"
                            required 
                            placeholder="Connor"
                        />
                        <br>
                        <span class="error" id="fname-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="mname">Middle Initial:</label></td>
                    <td>
                        <input 
                            type="text" 
                            name="mname" 
                            id="mname"
                            minlength="0"
                            maxlength="1" 
                            size="1"
                            style="width: 35px;"
                            title="Optional. One letter only."
                            pattern="[A-Za-z]{0,1}"
                            oninput="validateMname()"
                            onblur="validateMname()"
                            placeholder="M"
                        />
                        <br>
                        <span class="error" id="mname-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="lname">Last Name:</label></td>
                    <td>
                        <input 
                            type="text" 
                            name="lname" 
                            id="lname"
                            minlength="1"
                            maxlength="30" 
                            title="Letters, dashes, and apostrophes only"
                            pattern="[A-Za-z'-]{1,30}"
                            oninput="validateLname()"
                            onblur="validateLname()"
                            required 
                            placeholder="Cummings"
                        />
                        <br>
                        <span class="error" id="lname-error"></span>
                    </td>
                </tr>

                <!--Gender or sex-->

                <tr>
                    <td class="td1"><label for="pgender">Gender:</label></td>
                    <td>
                        <input
                        type="radio"
                        id="g1"
                        name="pgender"
                        value="Male"
                        />
                        Male

                        <input
                        type="radio"
                        id="g2"
                        name="pgender"
                        value="Female"
                        />
                        Female

                        <input
                        type="radio"
                        id="g3"
                        name="pgender"
                        value="Other"
                        />
                        Other
                    </td>
                </tr>

                <!--date of birth-->

                <tr>
                    <td class="td1"><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input
                        type="date"
                        id="dob"
                        name="dob"
                        onblur="validateDob()"
                        required
                        />
                        <br>
                        <span class="error" id="dob-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ssn">SSN:</label></td>
                    <td>
                        <input
                        type="password"
                        minlength="11"
                        maxlength="11"
                        name="ssn"
                        id="ssn"
                        required
                        title="Numbers Only"
                        placeholder="123-45-6789"
                        onblur="validateSsn()"
                        />
                        <br>
                        <span class="error" id="ssn-error"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!-- This makes it more organized-->
                </tr>

                <tr>
<!--Header-->         <th colspan="4"> Patient contact information</th>
                </tr>

                <tr>
                    <td class="td1"><label for="address1">Address:</label></td>
                    <td>
                        <input type="text" 
                        name="address1" 
                        id="address1" 
                        minlength="2"
                        maxlength="30"
                        title="Letters, dashes, and apostrophes only" 
                        required 
                        placeholder="1234 Address"
                        onblur="validateAddress1()"
                        />
                        <br>
                        <span class="error" id="address1-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="address2">Address:</label></td>
                    <td>
                        <input 
                            type="text" 
                            name="address2" 
                            id="address2" 
                            minlength="2"
                            maxlength="30" 
                            title="Optional. Apartment, suite, unit, building, or room number."
                            placeholder="Optional: Apt, suite, unit, etc."
                            oninput="validateAddress2()"
                            onblur="validateAddress2()"
                        />
                        <br>
                        <span class="error" id="address2-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input type="text" 
                        name="city" 
                        id="city" 
                        minlength="1"
                        maxlength="30"
                        title="Please enter your city" 
                        required 
                        placeholder="Houston"
                        onblur="validateCity()"
                        />
                        <br>
                        <span class="error" id="city-error"></span>
                    </td>
                </tr>

                <!--All the states including DC and PR-->
                <tr>
                    <td class="td1"><label for="state">State:</label></td>
                        <td>
                            <select id="state" name="state" onblur="validateState()" onchange="validateState()" required>
                                <option value="" selected disabled>Please Select One</option>
                                <option value="AL">Alabama</option>
                                <option value="AK">Alaska</option>
                                <option value="AZ">Arizona</option>
                                <option value="AR">Arkansas</option>
                                <option value="CA">California</option>
                                <option value="CO">Colorado</option>
                                <option value="CT">Connecticut</option>
                                <option value="DE">Delaware</option>
                                <option value="DC">District of Columbia</option>
                                <option value="FL">Florida</option>
                                <option value="GA">Georgia</option>
                                <option value="GU">Guam</option>    
                                <option value="HI">Hawaii</option>  
                                <option value="ID">Idaho</option>   
                                <option value="IL">Illinois</option>    
                                <option value="IN">Indiana</option> 
                                <option value="IA">Iowa</option>    
                                <option value="KS">Kansas</option>  
                                <option value="KY">Kentucky</option>    
                                <option value="LA">Louisiana</option>   
                                <option value="ME">Maine</option>   
                                <option value="MD">Maryland</option>    
                                <option value="MA">Massachusetts</option>   
                                <option value="MI">Michigan</option>    
                                <option value="MN">Minnesota</option>   
                                <option value="MS">Mississippi</option> 
                                <option value="MO">Missouri</option>
                                <option value="MT">Montana</option>
                                <option value="NE">Nebraska</option>
                                <option value="NV">Nevada</option>  
                                <option value="NH">New Hampshire</option>   
                                <option value="NJ">New Jersey</option>  
                                <option value="NM">New Mexico</option>  
                                <option value="NY">New York</option>    
                                <option value="NC">North Carolina</option>  
                                <option value="ND">North Dakota</option>    
                                <option value="OH">Ohio</option>    
                                <option value="OK">Oklahoma</option>    
                                <option value="OR">Oregon</option>  
                                <option value="PA">Pennsylvania</option>    
                                <option value="PR">Puerto Rico</option> 
                                <option value="RI">Rhode Island</option>    
                                <option value="SC">South Carolina</option>  
                                <option value="SD">South Dakota</option>    
                                <option value="TN">Tennessee</option>   
                                <option value="TX">Texas</option>   
                                <option value="UT">Utah</option>    
                                <option value="VT">Vermont</option> 
                                <option value="VA">Virginia</option>    
                                <option value="WA">Washington</option>  
                                <option value="WV">West Virginia</option>   
                                <option value="WI">Wisconsin</option>   
                                <option value="WY">Wyoming</option> 
                            </select>
                            <br>
                            <span class="error" id="state-error"></span>
                        </td>
                </tr>
                <tr>
                    <td class="td1"><label for="zcode">Zip Code:</label></td>
                        <td>
                            <input 
                                type="text" 
                                name="zcode" 
                                id="zcode" 
                                maxlength="5" 
                                pattern="[0-9]{5}"
                                title="Enter exactly 5 digits." 
                                required 
                                placeholder="12345"
                                oninput="validateZcode()"
                                onblur="validateZcode()"
                            />
                            <br>
                            <span class="error" id="zcode-error"></span>
                        </td>
                </tr>

                <tr>
                    <td class="td1"><label for="email">Email Address:</label></td>
                        <td>
                            <input type="text" 
                            name="email" 
                            id="email"
                            maxlength="30"
                            required
                            title="Please enter your email" 
                            placeholder="connor.cummings@gmail.com"
                            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
                            oninput="validateEmail()"
                            onblur="validateEmail()"
                            />
                            <br>
                            <span class="error" id="email-error"></span>
                        </td>
                </tr>

                <tr>
                    <td class="td1"><label for="phonenum">Phone Number:</label></td>
                        <td>
                            <input 
                                type="text" 
                                name="phonenum" 
                                id="phonenum" 
                                pattern="[0-9]{3}-?[0-9]{3}-?[0-9]{4}"
                                required
                                maxlength="12"
                                title="Enter 10 digits. Dashes are optional." 
                                placeholder="1234567890"
                                oninput="validatePhonenum()"
                                onblur="validatePhonenum()"
                            />
                            <br>
                            <span class="error" id="phonenum-error"></span>
                        </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!-- This makes a line allowing it to be more organized-->
                </tr>
                
                <!--Patient background-->

                <tr>
                    <th colspan="4">Patient's history</th>
                </tr>

                 <tr>
                    <td class="td1"><label for="vacc">Have you been vaccinated:</label></td>
                    <td>
                        <input
                            type="radio" 
                            id="v1" 
                            name="vacc" 
                            value="Yes"
                        />
                        Yes
                        <input 
                            type="radio" 
                            id="v2" 
                            name="vacc" 
                            value="No"
                        />
                        No
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="insur">Do you have insurance:</label></td>
                    <td>
                        <input 
                            type="radio" 
                            id="i1" 
                            name="insur" 
                            value="Yes"
                        /> 
                        Yes

                        <input 
                            type="radio" 
                            id="i2" 
                            name="insur" 
                            value="No"
                        /> 
                        No
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="pat_hist">Have you ever had?</label></td>
                    <td>
                        <input type="checkbox" id="h1" value="Diabetes"/>
                        <label for="Diabetes">Diabetes</label>

                        <input type="checkbox" id="h2" value="Heart Disease"/>
                        <label for="Heart Disease">Heart Disease</label>

                        <input type="checkbox" id="h3" value="Asthma"/>
                        <label for="Asthma">Asthma</label><br>

                        <input type="checkbox" id="h4" value="Cancer"/>
                        <label for="Cancer">Cancer</label>

                        <input type="checkbox" id="h5" value="Other"/>
                        <label for="Other">Other</label>
                </tr>

                <tr>
                    <td class="td1" align="right">
                        <label for="notes">Addional Notes:</label>
                    </td>
                    <td>
                        <textarea
                        rows="4"
                        cols="50"
                        maxlength="500"
                        id="notes"
                        name="notes"
                        title="Please write a discription of the symptoms you are experiencing"
                        placeholder="(Enter any additional medical history or concerns here...)"
                        ></textarea>
                        <span id="descirption_text"></span>
                    </td>
                </tr>

                <!-- Slider HTML Coding-->
                <tr>
                    <td class="td1"><label for="range">How is your health?<br/>(Rate from 0 to 10, 10 extreme pain)</label></td>
                    <td>
                        <input
                            type="range"
                            name="range"
                            id="range"
                            min="0"
                            max="10"
                            value="0"
                        />
                        <span id="range-slider"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!-- Webpage splitter-->
                </tr>

                <!-- Patient login Information-->
                <tr>
                    <th colspan="4">Make a Patient Account:</th>
                </tr>

                <tr>
                    <td class="td1"><label for="username">User ID:</label></td>
                    <td>
                        <input
                        type="text"
                        name="username"
                        id="username"
                        minlength="5"
                        maxlength="20"
                        required
                        title="Username must contain at least 5 characters, and cannot start with a number"
                        placeholder="ConnorC"
                        oninput="validateUsername()"
                        onblur="validateUsername()"
                        />
                        <br>
                        <span class="error" id="username-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="pass">Password:</label></td>
                    <td>
                        <input
                        type="password"
                        name="pass"
                        id="pass"
                        minlength="10"
                        maxlength="30"
                        required
                        title="Password must contain at least 10 characters, one uppercase letter, one number, one lowercase letter, and one special character"
                        placeholder="Password"
                        onblur="validatePass()"
                        oninput="validatePass()"
                        onfocus="validatePass()"
                        />
                        </br>
                        <span class="error" id="pass1-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="c_pass">Confirm Password:</label></td>
                    <td>
                        <input
                        type="password"
                        name="c_pass"
                        id="c_pass"
                        minlength="10"
                        maxlength="30"
                        required
                        title="Please re-enter your password"
                        placeholder="Confirm Password"
                        onblur="confirmPass()"
                        oninput="confirmPass()"
                        onfocus="confirmPass()"
                        />
                        </br>
                        <span class="error" id="pass2-error"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1" colspan="4">
                    <center>
                        <input type="submit" name="submit" id="submit" disabled style="font-family: 'Courier New', Courier, monospace;">
                        &nbsp;&nbsp;&nbsp; <!--spaces between submit and reset-->
                        <input type="reset" name="reset" id="reset" style="font-family: 'Courier New', Courier, monospace;">
                        &nbsp;&nbsp;&nbsp;
                        <input type="button" name="review" id="review" value="Review" style="font-family: 'Courier New', Courier, monospace;" onclick="reviewInput()">
                        &nbsp;&nbsp;&nbsp;
                        <input type="button" name="validate" id="validate" value="Validate" style="font-family: 'Courier New', Courier, monospace;" onclick="validateEverything()"> <!--New-->
                    </center>
                    </td>
                </tr>
            </table>
        </div>
    <!--New-->
    <div class="pass-message">
        <span id="msg1"></span> <br/>
        <span id="msg2"></span> <br/>  
        <span id="msg3"></span> <br/>  
        <span id="msg4"></span> <br/>  
        <span id="msg5"></span> <br/>  
        <span id="msg6"></span> <br/>  
        <span id="msg7"></span> <br/>    
    </div>
    <!--New-->
        <center>
        <p id="showInput"></p>
        </center>

    </center>
</form>

<footer>

    <div id="alert-content">
        <h4>Please fill out all required information</h4>
        <button id="close-alert">Ok</button>
    </div>
</div>

    </body>
</html>
